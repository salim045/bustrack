version: '3.8'

networks:
  busnet:
    driver: bridge

services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    networks:
      - busnet
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    networks:
      - busnet
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-rest:
    image: confluentinc/cp-kafka-rest:7.5.0
    container_name: kafka-rest
    networks:
      - busnet
    depends_on:
      - kafka
    ports:
      - "8082:8082"
    environment:
      KAFKA_REST_HOST_NAME: kafka-rest
      KAFKA_REST_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_REST_LISTENERS: http://0.0.0.0:8082
    restart: on-failure

  postgres:
    image: postgres:15
    container_name: postgres
    networks:
      - busnet
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: busdb
      POSTGRES_USER: bususer
      POSTGRES_PASSWORD: buspass
    volumes:
      - pgdata:/var/lib/postgresql/data

  etl:
    build:
      context: .
      dockerfile: Dockerfile.etl
    container_name: etl
    networks:
      - busnet
    depends_on:
      - kafka
      - postgres
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC_RAW: gps-raw
      KAFKA_TOPIC_ENRICHED: gps-enriched
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: busdb
      DB_USER: bususer
      DB_PASSWORD: buspass
    restart: on-failure

  prediction:
    build:
      context: .
      dockerfile: Dockerfile.prediction
    container_name: prediction
    networks:
      - busnet
    depends_on:
      - kafka
      - postgres
    volumes:
      - ./models:/app/models
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC_ENRICHED: gps-enriched
      KAFKA_TOPIC_PREDICTIONS: predictions
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: busdb
      DB_USER: bususer
      DB_PASSWORD: buspass
    restart: on-failure

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: api
    networks:
      - busnet
    depends_on:
      - postgres
      - kafka
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: busdb
      DB_USER: bususer
      DB_PASSWORD: buspass
      KAFKA_BROKER: kafka:9092
    restart: on-failure

  webapp:
    image: nginx:alpine
    container_name: webapp
    networks:
      - busnet
    ports:
      - "3000:80"
    volumes:
      - ./app:/usr/share/nginx/html
    restart: unless-stopped

volumes:
  pgdata:
